<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hagav · Studio de Edição</title>
  <meta name="description" content="Vídeos para empresas que levam conteúdo a sério." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --yellow: #FFB800; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0C0200;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 75% 90% at -8% 50%, rgba(210,85,0,.95) 0%, rgba(170,55,0,.55) 30%, transparent 58%),
        radial-gradient(ellipse 55% 45% at 108% 5%, rgba(190,70,0,.75) 0%, rgba(140,45,0,.3) 30%, transparent 55%),
        radial-gradient(ellipse 45% 40% at 105% 95%, rgba(160,55,0,.6) 0%, transparent 50%),
        radial-gradient(ellipse 35% 30% at 50% 50%, rgba(0,0,0,.85) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    /* Curved light streaks */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 50% at -20% 30%, transparent 58%, rgba(200,80,0,.12) 59%, transparent 60%),
        radial-gradient(ellipse 140% 65% at -20% 30%, transparent 68%, rgba(200,80,0,.08) 69%, transparent 70%),
        radial-gradient(ellipse 100% 40% at -10% 75%, transparent 55%, rgba(200,80,0,.1) 56%, transparent 57%),
        radial-gradient(ellipse 90% 60% at 110% 10%, transparent 60%, rgba(200,80,0,.1) 61%, transparent 62%);
      pointer-events: none;
      z-index: 0;
    }
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      min-height: 100svh;
      padding: 20px 20px 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo { flex-shrink: 0; }
    .logo img { height: 210px; width: auto; display: block; }
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 28px 20px 24px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-top: -48px;
    }
    h1 {
      font-size: clamp(10px, 2.6vw, 11.5px);
      font-weight: 800;
      line-height: 1.45;
      letter-spacing: .02em;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      margin-bottom: 12px;
      width: 100%;
      white-space: nowrap;
    }
    h1 em { font-style: normal; color: var(--yellow); display: block; white-space: nowrap; }
    .stats {
      list-style: none;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px 16px;
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
    }
    .stats li {
      font-size: 11.5px;
      color: rgba(255,255,255,.55);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 500;
      white-space: nowrap;
    }
    .stats .check {
      color: var(--yellow);
      font-size: 10px;
      flex-shrink: 0;
    }
    .btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:focus { outline: none; }
    .btn:focus-visible { outline: none; }
    .btn:active { transform: scale(.97) !important; }
    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-icon svg { width: 17px; height: 17px; }
    .btn-label { flex: 1; }
    .btn-arrow { font-size: 15px; margin-left: auto; transition: transform .2s; }
    .btn-primary {
      background: var(--yellow);
      color: #000;
      box-shadow: 0 6px 32px rgba(255,184,0,.38);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,184,0,.55); }
    .btn-primary .btn-icon { background: rgba(0,0,0,.15); }
    .btn-primary .btn-icon svg { fill: #000; }
    .btn-primary .btn-arrow { opacity: .55; }
    .btn-secondary {
      background: rgba(255,255,255,.055);
      color: #fff;
      border-color: rgba(255,255,255,.1);
    }
    @media (hover: hover) {
      .btn-secondary:hover { transform: translateY(-2px); background: rgba(255,184,0,.07); border-color: rgba(255,184,0,.25); box-shadow: 0 0 18px rgba(255,184,0,.12); }
      .btn:hover .btn-arrow { transform: translateX(3px); }
    }
    .btn-secondary .btn-icon { background: rgba(255,255,255,.09); }
    .btn-secondary .btn-icon svg { fill: rgba(255,255,255,.7); }
    .btn-secondary .btn-arrow { opacity: .35; }

  </style>
</head>
