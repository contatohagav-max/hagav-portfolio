<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hagav · Studio de Edição</title>
  <meta name="description" content="Vídeos para empresas que levam conteúdo a sério." />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0b0b0b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/budget-inline.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #ffb800;
      --glass: rgba(255, 255, 255, 0.11);
      --glass-strong: rgba(255, 255, 255, 0.16);
      --text-soft: rgba(255, 255, 255, 0.66);
      --bg: #0b0b0b;
      --bg-soft: #111111;
      --bg-deep: #141414;
      --float-time-a: 14s;
      --float-time-b: 17s;
      --float-time-c: 20s;
    }
    html, body {
      min-height: 100%;
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: clamp(20px, 5.2vh, 52px);
      background:
        radial-gradient(110% 68% at 50% -10%, rgba(255, 204, 116, 0.12) 0%, transparent 46%),
        linear-gradient(180deg, #090909 0%, var(--bg-soft) 48%, var(--bg-deep) 100%);
      color: #fff;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 62% 76% at -10% 44%, rgba(255, 146, 58, 0.18) 0%, rgba(120, 48, 19, 0.1) 38%, transparent 74%),
        radial-gradient(ellipse 60% 70% at 110% 16%, rgba(255, 194, 103, 0.16) 0%, rgba(131, 68, 30, 0.08) 34%, transparent 74%),
        radial-gradient(ellipse 58% 32% at 50% 104%, rgba(255, 181, 75, 0.08) 0%, transparent 68%);
      z-index: 0;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 86% at 50% 50%, transparent 52%, rgba(0, 0, 0, 0.42) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.015) 0%, rgba(255, 255, 255, 0) 28%);
      z-index: 0;
      pointer-events: none;
    }
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 454px;
      min-height: 100svh;
      margin: 0 auto;
      padding: 26px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .hero-shell,
    .content,
    footer {
      position: relative;
      z-index: 1;
      width: 100%;
    }
    .hero-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transition: gap .24s ease, margin .24s ease;
    }
    .hero-shell.budget-active {
      gap: 18px;
      margin-bottom: 0;
    }
    .logo {
      display: flex;
      justify-content: center;
      width: 100%;
      transition: opacity .25s ease, transform .25s ease, width .25s ease;
    }
    .logo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(50vw, 188px);
      padding: 0;
      margin: 0;
      border: none;
      background: none;
      border-radius: 24px;
      text-decoration: none;
      cursor: pointer;
      transition: transform .18s ease, filter .2s ease, opacity .2s ease;
      -webkit-tap-highlight-color: transparent;
      animation: logoFloat 12s ease-in-out infinite alternate;
    }
    .logo img {
      width: 100%;
      max-width: none;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.34));
      margin-bottom: -18px;
    }
    .logo-link:focus-visible {
      outline: 1px solid rgba(255, 196, 108, 0.58);
      outline-offset: 3px;
    }
    .logo.budget-logo .logo-link { width: min(50vw, 188px); }
    .logo.budget-logo img { margin-bottom: -18px; }
    .content {
      margin-top: 0;
      background: linear-gradient(180deg, rgba(19, 19, 19, 0.92), rgba(11, 11, 11, 0.92));
      border: 1.1px solid rgba(255, 198, 92, 0.34);
      border-radius: 30px;
      box-shadow:
        0 0 0 1px rgba(255, 198, 92, 0.05),
        0 28px 60px rgba(0, 0, 0, 0.54),
        0 0 34px rgba(255, 184, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
      transition: padding .24s ease, box-shadow .24s ease, border-color .24s ease;
    }
    .content { padding: 20px 14px 16px; }
    .content::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top center, rgba(255, 199, 96, 0.08) 0%, rgba(255, 199, 96, 0) 40%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 26%);
      pointer-events: none;
      z-index: 0;
    }
    .content.budget-focus {
      padding: 26px 20px 22px;
      border-color: rgba(255, 192, 72, 0.56);
      box-shadow:
        0 0 0 1px rgba(255, 198, 92, 0.08),
        0 30px 62px rgba(0, 0, 0, 0.56),
        0 0 42px rgba(255, 184, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .hero-copy {
      position: relative;
      z-index: 1;
      padding: 4px 10px 18px;
      text-align: center;
      max-height: 220px;
      overflow: hidden;
      transition: opacity .25s ease, max-height .25s ease, transform .25s ease, padding .25s ease;
    }
    .hero-copy.is-hidden {
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }
    .hero-microcopy {
      max-width: 328px;
      margin: 0 auto;
      color: rgba(255,255,255,.92);
      font-size: 15px;
      line-height: 1.46;
      font-weight: 600;
      text-wrap: balance;
    }
    .hero-microcopy strong {
      color: rgba(255, 193, 71, 0.98);
      font-weight: 800;
    }
    #pane-actions {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .hidden { display: none !important; }
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      min-height: 92px;
      padding: 16px 18px;
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      background: linear-gradient(180deg, rgba(23, 23, 23, 0.94), rgba(10, 10, 10, 0.98));
      border: 1.1px solid rgba(255, 203, 109, 0.18);
      border-radius: 24px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 16px 30px rgba(0, 0, 0, 0.34),
        0 0 0 1px rgba(255, 198, 92, 0.05);
      cursor: pointer;
      overflow: hidden;
      transition: transform .2s ease, border-color .22s ease, box-shadow .22s ease, background .22s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 205, 120, 0.08) 0%, rgba(255, 205, 120, 0) 44%, rgba(255, 255, 255, 0) 68%, rgba(255, 255, 255, 0.02) 100%);
      pointer-events: none;
    }
    .btn-icon {
      width: 76px;
      height: 76px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 38% 34%, rgba(255, 208, 112, 0.22), rgba(255, 208, 112, 0.06) 42%, rgba(9, 9, 9, 0.94) 72%),
        linear-gradient(180deg, rgba(22, 22, 22, 0.95), rgba(8, 8, 8, 0.98));
      border: 1.4px solid rgba(255, 192, 74, 0.74);
      box-shadow:
        0 0 0 1px rgba(255, 192, 74, 0.12),
        0 0 20px rgba(255, 184, 0, 0.14),
        inset 0 1px 0 rgba(255, 245, 214, 0.14);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .btn-icon svg { width: 26px; height: 26px; fill: rgba(255, 202, 96, 0.98); }
    .btn-icon .btn-icon-play { width: 28px; height: 28px; }
    .btn-label {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      line-height: 1.2;
      color: #fff;
      text-align: left;
      text-wrap: balance;
    }
    .btn-arrow {
      margin-left: auto;
      color: rgba(255, 189, 44, 0.98);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      font-size: 18px;
      line-height: 1;
      transition: transform .22s ease;
    }
    .mode-back {
      margin-top: 4px;
      background: none;
      border: none;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
    }
    footer {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.04em;
      padding-top: 18px;
    }
    .footer-line {
      width: 64px;
      height: 1px;
      flex-shrink: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 188, 62, 0.72), transparent);
      opacity: 0.78;
    }
    .footer-copy {
      opacity: 0.88;
      text-wrap: nowrap;
    }
    @media (hover: hover) {
      .logo-link:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
      }
      .btn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 204, 104, 0.36);
        background: linear-gradient(180deg, rgba(26, 26, 26, 0.95), rgba(10, 10, 10, 0.98));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 20px 38px rgba(0,0,0,.38),
          0 0 24px rgba(255,184,0,.16);
      }
      .btn:hover .btn-arrow { transform: translateX(3px); }
    }
    .btn:active { transform: scale(.985); }
    @media (min-width: 561px) {
      .page {
        max-width: 486px;
        padding: 28px 20px 22px;
      }
      .hero-shell { gap: 18px; }
      .logo-link { width: min(36vw, 196px); }
      .hero-microcopy { max-width: 348px; font-size: 15.5px; }
      .content { padding: 22px 16px 18px; }
      .btn { min-height: 96px; }
    }
    @media (max-width: 560px) {
      body { padding-top: 20px; }
      .page {
        padding: 22px 16px 18px;
        justify-content: center;
      }
      .hero-shell { gap: 16px; }
      .logo-link { width: min(54vw, 196px); }
      .content {
        padding: 20px 14px 16px;
        border-radius: 28px;
      }
      .content.budget-focus {
        padding: 24px 18px 20px;
      }
      .hero-microcopy { max-width: 310px; }
      .btn { padding: 15px 16px; }
      .btn-label { font-size: 15px; }
    }
    @media (max-width: 390px) {
      .page { padding: 18px 14px 16px; }
      .logo-link { width: min(56vw, 182px); }
      .logo img { margin-bottom: -16px; }
      .hero-microcopy {
        max-width: 278px;
        font-size: 14px;
        line-height: 1.44;
      }
      .btn {
        min-height: 86px;
        padding: 14px 14px;
      }
      .btn-icon {
        width: 70px;
        height: 70px;
      }
      .footer-line { width: 54px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .logo-link { animation: none !important; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes logoFloat {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(0, -4px, 0); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="hero-shell">
      <div class="logo">
        <button class="logo-link" id="logo-home-link" type="button" aria-label="Voltar ao início">
          <img src="./assets/logo-oficial-master-bg.png" alt="HAGAV Studio" decoding="async" />
        </button>
      </div>
    </header>

    <section class="content" id="hero-card">
      <div class="hero-copy" id="hero-copy">
        <p class="hero-microcopy">
          Vídeos <strong>sob medida</strong> para vender melhor,
          com processo claro e atendimento direto.
        </p>
      </div>
      <div class="pane" id="pane-actions">
        <a href="./portfolio.html" class="btn">
          <span class="btn-icon"><svg class="btn-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>
          <span class="btn-label">Ver nossos projetos</span>
          <span class="btn-arrow">→</span>
        </a>

        <button class="btn btn-budget" id="open-budget-modes" type="button">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm10 0h6v6h-6V4zM4 14h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg></span>
          <span class="btn-label">Solicitar orçamento</span>
          <span class="btn-arrow">→</span>
        </button>

        <a href="https://wa.me/5573982284382" class="btn" target="_blank" rel="noopener" data-whatsapp-track data-track-page="home" data-track-origin="H - HOME">
          <span class="btn-icon"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.11.37 2.3.56 3.58.56a1 1 0 011 1V20a1 1 0 01-1 1C10.85 21 3 13.15 3 3a1 1 0 011-1h3.5a1 1 0 011 1c0 1.28.19 2.47.56 3.58a1 1 0 01-.24 1.01l-2.2 2.2z"/></svg></span>
          <span class="btn-label">Falar no WhatsApp</span>
          <span class="btn-arrow">→</span>
        </a>
      </div>
      <section class="pane hidden" id="pane-budget" aria-live="polite">
        <div class="budget-shell">
          <section class="progress-wrap" aria-live="polite">
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="progress-label" id="progress-label">0 / 0</div>
          </section>
          <section class="steps" id="steps"></section>
        </div>
      </section>
    </section>
    <footer>
      <span class="footer-line" aria-hidden="true"></span>
      <span class="footer-copy">© <span data-footer-year>2026</span> HAGAV Studio de Edição</span>
      <span class="footer-line" aria-hidden="true"></span>
    </footer>
  </div>
  <script src="./assets/budget-inline.js"></script>
  <script src="./assets/whatsapp-tracking.js"></script>
  <script>
    const paneActions = document.getElementById('pane-actions');
    const paneBudget = document.getElementById('pane-budget');
    const heroCard = document.getElementById('hero-card');
    const logoWrap = document.querySelector('.logo');
    const heroShell = document.querySelector('.hero-shell');
    const heroCopy = document.getElementById('hero-copy');
    function setBudgetFocus(isBudget){
      heroCard.classList.toggle('budget-focus', !!isBudget);
      logoWrap.classList.toggle('budget-logo', !!isBudget);
      heroShell.classList.toggle('budget-active', !!isBudget);
      heroCopy.classList.toggle('is-hidden', !!isBudget);
    }
    function switchPane(target){
      paneActions.classList.add('hidden');
      paneBudget.classList.add('hidden');
      target.classList.remove('hidden');
      setBudgetFocus(target === paneBudget);
    }
    function scrollToElement(el){
      if(!el) return;
      el.scrollIntoView({behavior:'smooth', block:'start'});
    }
    document.getElementById('logo-home-link').addEventListener('click',()=>{
      if(window.HagavBudget&&typeof window.HagavBudget.clearWizard==='function'){
        window.HagavBudget.clearWizard();
      }
      switchPane(paneActions);
      window.scrollTo({top:0,behavior:'smooth'});
    });
    document.getElementById('open-budget-modes').addEventListener('click',()=>{
      if(window.HagavBudget&&typeof window.HagavBudget.clearWizard==='function'){
        window.HagavBudget.clearWizard();
      }
      switchPane(paneBudget);
      window.scrollTo({top:0,behavior:'smooth'});
    });
    document.querySelectorAll('[data-footer-year]').forEach((el)=>{
      el.textContent = String(new Date().getFullYear());
    });
  </script>
</body>
</html>
