[build]
  # Publica os arquivos estáticos do root (site público)
  publish = "."
  # Compila o painel Next.js e copia para /admin
  command = "cd painel-hagav && npm ci && npm run build && cp -r out/* ../admin/"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Rota SPA fallback para /admin — qualquer sub-rota serve o index
[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/admin/*"
  to     = "/admin/index.html"
  status = 200

# Bloqueia acesso ao .env e arquivos sensíveis
[[redirects]]
  from   = "/.env*"
  to     = "/404.html"
  status = 404
  force  = true
