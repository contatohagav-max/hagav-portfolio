
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orcamento · HAGAV Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--yellow:#ffb800;--bg:#090304;--glass:rgba(255,255,255,.12);--glass-strong:rgba(255,255,255,.2);--text-soft:rgba(255,255,255,.68);--ok:#58d08b;--danger:#ff7373}
    html,body{min-height:100%;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:#fff;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 78% 96% at -8% 50%,rgba(255,122,37,.58) 0%,rgba(110,32,8,.3) 42%,transparent 70%),radial-gradient(ellipse 65% 50% at 108% 0%,rgba(252,168,64,.32) 0%,rgba(120,40,11,.18) 34%,transparent 65%),radial-gradient(ellipse 45% 34% at 88% 90%,rgba(255,141,0,.12) 0%,transparent 65%),linear-gradient(135deg,#090304 0%,#0e0607 54%,#120807 100%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 92% 56% at 50% 120%,rgba(255,172,72,.2) 0%,transparent 62%),radial-gradient(ellipse 160% 66% at -26% 28%,transparent 64%,rgba(255,165,58,.15) 65%,transparent 67%),radial-gradient(ellipse 140% 70% at 124% 14%,transparent 66%,rgba(255,145,32,.1) 67%,transparent 69%);mix-blend-mode:screen;pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;width:min(100%,560px);min-height:100svh;margin:0 auto;padding:0 20px 80px;display:flex;flex-direction:column}
    .header{display:flex;justify-content:center;padding:16px 0 0;margin-bottom:-12px}
    .header img{height:108px;width:auto;display:block}
    .intro{text-align:center;padding:10px 4px 18px}
    .intro h1{font-size:clamp(17px,4.8vw,22px);font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;margin-bottom:8px}
    .intro p{font-size:13px;line-height:1.6;color:var(--text-soft)}
    .progress-wrap{margin-bottom:18px;padding:0 2px}
    .progress-track{height:2px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:var(--yellow);transition:width .28s ease}
    .progress-label{margin-top:6px;text-align:right;font-size:11px;color:rgba(255,255,255,.42);letter-spacing:.05em}
    .steps{display:flex;flex-direction:column;gap:10px;flex:1}
    .step-done{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);animation:fadeIn .25s ease}
    .step-done .label{font-size:12px;color:rgba(255,255,255,.72);font-weight:700;line-height:1.4}
    .step-done .ok{font-size:12px;color:var(--ok);opacity:.9}
    .step-active{position:relative;border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.05));box-shadow:0 14px 30px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:20px;animation:slideIn .28s ease}
    .step-back{position:absolute;top:10px;right:10px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.84);font-size:11px;font-weight:700;border-radius:999px;padding:7px 10px;cursor:pointer}
    .step-title{font-size:20px;font-weight:800;line-height:1.3;padding-right:66px}
    .step-hint{font-size:12px;line-height:1.5;color:rgba(255,255,255,.54);margin:7px 0 14px}
    .field,.textarea,.time-input{width:100%;border-radius:11px;border:1.2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;padding:12px 13px;outline:none;transition:border-color .18s ease, background .18s ease}
    .textarea{resize:none;min-height:90px;line-height:1.5}
    .field::placeholder,.textarea::placeholder,.time-input::placeholder{color:rgba(255,255,255,.33)}
    .field:focus,.textarea:focus,.time-input:focus{border-color:rgba(255,184,0,.52);background:rgba(255,184,0,.07)}
    .options{display:flex;flex-direction:column;gap:8px}
    .opt{width:100%;text-align:left;border-radius:12px;border:1.2px solid rgba(255,255,255,.16);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));box-shadow:0 8px 18px rgba(0,0,0,.2);color:#fff;font-size:13px;font-weight:700;padding:12px 13px;cursor:pointer;transition:all .16s ease}
    .opt.active{border-color:rgba(255,200,112,.55);background:linear-gradient(135deg,rgba(255,200,112,.22),rgba(255,255,255,.08))}
    .opt-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
    .opt-check{color:var(--ok);font-size:11px;opacity:0;transition:opacity .15s ease}
    .opt.active .opt-check{opacity:1}
    .grid-group{display:flex;flex-direction:column;gap:10px}
    .group-row{border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px;background:rgba(255,255,255,.04);display:flex;flex-direction:column;gap:8px}
    .group-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
    .qty-input{max-width:120px}
    .quick-times{display:flex;gap:6px;flex-wrap:wrap}
    .quick-time{border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;font-size:12px;font-weight:700;padding:8px 10px;cursor:pointer}
    .actions{display:flex;gap:8px;margin-top:14px;align-items:center}
    .btn-main,.btn-skip{border-radius:11px;font-family:inherit;font-weight:800;cursor:pointer;border:1.2px solid var(--glass);transition:all .16s ease}
    .btn-main{background:linear-gradient(135deg,rgba(255,210,130,.24),rgba(255,255,255,.09));color:#fff;border-color:rgba(255,201,114,.42);font-size:13px;padding:11px 18px}
    .btn-skip{background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));color:rgba(255,255,255,.72);font-size:12px;padding:11px 14px}
    .btn-submit{width:100%;margin-top:6px;border-radius:14px;border:1.2px solid rgba(255,201,114,.42);background:linear-gradient(135deg,rgba(255,210,130,.24),rgba(255,255,255,.09));color:#fff;font-size:15px;font-weight:800;font-family:inherit;padding:14px;cursor:pointer}
    .btn-main[disabled],.btn-submit[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .error{display:none;margin-top:7px;font-size:12px;color:var(--danger)}
    .submit-note{font-size:11px;line-height:1.5;color:rgba(255,255,255,.56);margin:10px 0 2px}
    .turnstile-wrap{margin-top:10px;padding:10px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(255,255,255,.03);overflow:hidden}
    .bot-trap{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none}
    .type-picker{border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.05));box-shadow:0 14px 30px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.14);padding:16px;display:flex;flex-direction:column;gap:10px;animation:slideIn .28s ease}
    .type-picker h2{font-size:18px;font-weight:800;line-height:1.3}
    footer{text-align:center;font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.04em;padding:20px 0 14px}
    @media(hover:hover){.opt:hover,.btn-main:hover,.btn-skip:hover,.btn-submit:hover,.quick-time:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(0,0,0,.26),0 0 18px rgba(255,184,0,.09)}.step-back:hover{background:rgba(255,255,255,.14)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <main class="page">
    <div class="header"><img src="./assets/logo.png" alt="HAGAV" /></div>
    <section class="intro">
      <h1>Orcamento personalizado</h1>
      <p>Leva cerca de 2 minutos e nos ajuda a responder com mais rapidez e assertividade.</p>
    </section>
    <section class="progress-wrap" aria-live="polite">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </section>
    <section class="steps" id="steps"></section>
    <footer>© 2026 HAGAV Studio de Edicao</footer>
  </main>
  <script>
    const WA_NUMBER = '5573982284382';
    const DDD_VALIDOS = new Set(['11','12','13','14','15','16','17','18','19','21','22','24','27','28','31','32','33','34','35','37','38','41','42','43','44','45','46','47','48','49','51','53','54','55','61','62','63','64','65','66','67','68','69','71','73','74','75','77','79','81','82','83','84','85','86','87','88','89','91','92','93','94','95','96','97','98','99']);
    const FIELD_LIMITS = { nome: 80, instagram: 80, empresa: 100, extras: 1000, referencia: 700, outro: 180, duration: 32, service: 80 };
    const FINAL_COOLDOWN_MS = 10000;
    const MIN_ELAPSED_MS = 3500;
    const state = {
      tipo: getTipoFromUrl(),
      currentIndex: 0,
      readyToSubmit: false,
      answers: {},
      startedAt: Date.now(),
      turnstileSiteKey: '',
      turnstileToken: '',
      turnstileWidgetId: null,
      turnstilePendingPromise: null,
      turnstileResolve: null,
      turnstileReject: null,
      isSubmitting: false,
      submitLockedUntil: 0,
      lastSubmissionHash: '',
      finalError: ''
    };
    const stepsEl = document.getElementById('steps');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel = document.getElementById('progress-label');
    function getTipoFromUrl(){const tipo=new URLSearchParams(window.location.search).get('tipo');return (tipo==='unica'||tipo==='recorrente')?tipo:''}
    function getSteps(){if(state.tipo==='unica') return getStepsUnica(); if(state.tipo==='recorrente') return getStepsRecorrente(); return []}
    function getSelectedServices(){
      const raw=state.answers.unica_servicos;
      if(!raw||!Array.isArray(raw.selected)) return [];
      return raw.selected.map((item)=>{
        if(item!=='Outro') return sanitizeText(item,FIELD_LIMITS.service||80);
        const extra=sanitizeText(raw.outro||'',FIELD_LIMITS.outro);
        return extra?('Outro: '+extra):'Outro';
      });
    }
    function getRecordedYesServices(){const selected=getSelectedServices();const map=state.answers.unica_gravado||{};return selected.filter((service)=>map[service]==='Sim')}
    function getStepsUnica(){
      const selected=getSelectedServices();
      const withYes=getRecordedYesServices();
      return [
        {id:'unica_servicos',label:'Servico necessario',title:'Qual servico voce precisa?',type:'multi',required:true,options:['Reels','Shorts','TikTok','Corte Estrategico','Criativo para Ads','Outro'],outro:true},
        {id:'unica_quantidades',label:'Quantidade por servico',title:'Quantidade por servico selecionado',hint:'Preencha uma quantidade para cada servico escolhido.',type:'quantityByService',required:true,services:selected},
        {id:'unica_gravado',label:'Material gravado',title:'O material ja esta gravado?',hint:'Responda para cada servico selecionado.',type:'yesNoByService',required:true,services:selected},
        {id:'unica_tempo_bruto',label:'Tempo de material bruto',title:'Quanto tempo de material bruto para edicao?',hint:'Somente para servicos com material gravado.',type:'durationByService',required:withYes.length>0,optionalWhenEmpty:true,services:withYes},
        {id:'unica_referencia',label:'Referencia visual',title:'Tem referencia visual?',hint:'Envie link de referencia do Instagram, YouTube, TikTok ou Meta Ads. Ou pule.',type:'textarea',required:false,placeholder:'Cole links ou descreva referencias...'},
        {id:'unica_prazo',label:'Prazo ideal',title:'Qual o prazo ideal?',type:'single',required:true,options:['24h','3 dias','Essa semana','Sem pressa']},
        {id:'nome',label:'Nome',title:'Qual e o seu nome?',type:'text',required:true,placeholder:'Digite seu nome'},
        {id:'whatsapp',label:'WhatsApp',title:'Qual o seu WhatsApp?',type:'phone',required:true,placeholder:'(00) 00000-0000'},
        {id:'instagram',label:'Instagram',title:'Qual o seu Instagram?',type:'text',required:false,placeholder:'@seuperfil'},
        {id:'extras',label:'Observacoes extras',title:'Observacoes extras',type:'textarea',required:false,placeholder:'Algo que voce queira complementar...'}
      ].filter((step)=>!(step.optionalWhenEmpty&&(!step.services||step.services.length===0)));
    }
    function getStepsRecorrente(){
      return [
        {id:'rec_tipo_operacao',label:'Tipo de operacao',title:'Qual tipo de operacao voce precisa?',type:'single',required:true,options:['Conteudo para redes sociais','Criativos para anuncios','Escala de conteudo','Lancamentos','YouTube recorrente','Estrutura completa','Outro'],outro:true},
        {id:'rec_volume',label:'Volume mensal',title:'Quantos conteudos por mes voce precisa?',type:'single',required:true,options:['5 a 10','10 a 20','20 a 40','40+','Ainda nao sei']},
        {id:'rec_objetivo',label:'Objetivo principal',title:'Qual seu principal objetivo?',type:'single',required:true,options:['Vender mais','Crescer autoridade','Ganhar consistencia','Escalar operacao','Outro'],outro:true},
        {id:'rec_gravado',label:'Material gravado',title:'Voce ja possui material gravado?',type:'single',required:true,options:['Sim','Nao','Parcialmente']},
        {id:'rec_inicio',label:'Prazo para comecar',title:'Qual o prazo para comecar?',type:'single',required:true,options:['Imediato','Essa semana','Esse mes','Estou analisando']},
        {id:'nome',label:'Nome',title:'Qual e o seu nome?',type:'text',required:true,placeholder:'Digite seu nome'},
        {id:'whatsapp',label:'WhatsApp',title:'Qual o seu WhatsApp?',type:'phone',required:true,placeholder:'(00) 00000-0000'},
        {id:'instagram',label:'Instagram',title:'Qual o seu Instagram?',type:'text',required:true,placeholder:'@seuperfil'},
        {id:'empresa',label:'Empresa / Marca',title:'Qual sua empresa ou marca?',type:'text',required:false,placeholder:'Opcional'},
        {id:'extras',label:'Observacoes extras',title:'Observacoes extras',type:'textarea',required:false,placeholder:'Algo que voce queira complementar...'}
      ];
    }
    function render(){
      if(!state.tipo){renderTypePicker();updateProgress(0,0);return}
      const steps=getSteps();
      if(steps.length===0){renderTypePicker();updateProgress(0,0);return}
      if(state.readyToSubmit){
        stepsEl.innerHTML='';
        steps.forEach((step)=>{
          const done=document.createElement('article');
          done.className='step-done';
          done.innerHTML='<span class=\"label\">'+escapeHtml(step.label)+'</span><span class=\"ok\">✓</span>';
          stepsEl.appendChild(done);
        });
        const submitCard=document.createElement('article');
        submitCard.className='step-active';
        state.turnstileToken='';
        state.turnstileWidgetId=null;
        submitCard.innerHTML='<button class=\"step-back\" type=\"button\" id=\"go-back-final\">Voltar</button>'+
          '<h2 class=\"step-title\">'+(state.tipo==='unica'?'Tudo certo para enviar seu orcamento':'Tudo certo para enviar sua proposta')+'</h2>'+
          '<p class=\"step-hint\">Revise rapidamente e clique para abrir o WhatsApp com todas as respostas organizadas.</p>'+
          '<label class=\"bot-trap\" aria-hidden=\"true\">Nao preencher<input type=\"text\" id=\"spam-trap\" tabindex=\"-1\" autocomplete=\"off\" /></label>'+
          '<div class=\"turnstile-wrap\"><div id=\"turnstile-widget\"></div></div>'+
          '<p class=\"submit-note\">Protecao anti-spam ativa para manter o atendimento rapido e seguro.</p>'+
          '<div class=\"error\" id=\"submit-error\"></div>'+
          '<button class=\"btn-submit\" type=\"button\" id=\"final-submit\">'+(state.tipo==='unica'?'Solicitar orcamento no WhatsApp':'Solicitar proposta no WhatsApp')+'</button>';
        stepsEl.appendChild(submitCard);
        submitCard.querySelector('#go-back-final').addEventListener('click',()=>{state.readyToSubmit=false;state.currentIndex=Math.max(0,steps.length-1);state.finalError='';render();});
        submitCard.querySelector('#final-submit').addEventListener('click',()=>handleFinalSubmit(submitCard));
        if(state.finalError){
          const errorEl=submitCard.querySelector('#submit-error');
          errorEl.textContent=state.finalError;
          errorEl.style.display='block';
        }
        initTurnstile(submitCard);
        updateProgress(steps.length,steps.length);
        return;
      }
      if(state.currentIndex<0) state.currentIndex=0;
      if(state.currentIndex>steps.length-1) state.currentIndex=steps.length-1;
      stepsEl.innerHTML='';
      const active=steps[state.currentIndex];
      for(let i=0;i<state.currentIndex;i++){
        const done=document.createElement('article');
        done.className='step-done';
        done.innerHTML='<span class="label">'+escapeHtml(steps[i].label)+'</span><span class="ok">✓</span>';
        stepsEl.appendChild(done);
      }
      const activeCard=document.createElement('article');
      activeCard.className='step-active';
      activeCard.innerHTML=buildActiveStepMarkup(active,state.currentIndex>0);
      stepsEl.appendChild(activeCard);
      attachStepEvents(active,activeCard);
      updateProgress(state.currentIndex+1,steps.length);
    }
    function renderTypePicker(){
      stepsEl.innerHTML='';
      const picker=document.createElement('article');
      picker.className='type-picker';
      picker.innerHTML='<h2>Escolha o tipo de orcamento</h2>'+
        '<button class="opt" data-set-tipo="unica"><span class="opt-row"><span>Demanda Unica</span><span class="opt-check">→</span></span></button>'+
        '<button class="opt" data-set-tipo="recorrente"><span class="opt-row"><span>Demanda Recorrente</span><span class="opt-check">→</span></span></button>';
      picker.querySelectorAll('[data-set-tipo]').forEach((btn)=>{btn.addEventListener('click',()=>{state.tipo=btn.getAttribute('data-set-tipo');state.currentIndex=0;state.readyToSubmit=false;state.startedAt=Date.now();state.finalError='';const url=new URL(window.location.href);url.searchParams.set('tipo',state.tipo);window.history.replaceState({},'',url.toString());render();})});
      stepsEl.appendChild(picker);
    }
    function buildActiveStepMarkup(step,canGoBack){
      const hint=step.hint?'<p class="step-hint">'+escapeHtml(step.hint)+'</p>':'';
      const back=canGoBack?'<button class="step-back" type="button" id="go-back">Voltar</button>':'';
      const error='<div class="error" id="step-error"></div>';
      let body='';
      if(step.type==='text'||step.type==='phone'){
        const value=step.type==='phone'?formatPhone(state.answers[step.id]||''):(state.answers[step.id]||'');
        const maxLen=step.type==='phone'?15:getTextLimitForField(step.id);
        body='<input class="field" id="step-input" type="text" value="'+escapeAttr(value)+'" placeholder="'+escapeAttr(step.placeholder||'')+'" autocomplete="off" maxlength="'+maxLen+'" />';
      }
      if(step.type==='textarea'){
        const maxLen=step.id==='unica_referencia'?FIELD_LIMITS.referencia:FIELD_LIMITS.extras;
        body='<textarea class="textarea" id="step-input" placeholder="'+escapeAttr(step.placeholder||'')+'" maxlength="'+maxLen+'">'+escapeHtml(state.answers[step.id]||'')+'</textarea>';
      }
      if(step.type==='single'){
        const value=state.answers[step.id]||'';
        const otherText=(state.answers[step.id+'_outro']||'');
        body='<div class="options">'+step.options.map((opt)=>{const active=value===opt?' active':'';return '<button class="opt'+active+'" type="button" data-single="'+escapeAttr(opt)+'"><span class="opt-row"><span>'+escapeHtml(opt)+'</span><span class="opt-check">✓</span></span></button>';}).join('')+'</div>';
        if(step.outro){const show=value==='Outro'?'':' style="display:none"';body+='<div id="single-outro-wrap"'+show+'><input class="field" id="single-outro" type="text" placeholder="Descreva aqui..." value="'+escapeAttr(otherText)+'" maxlength="'+FIELD_LIMITS.outro+'" /></div>'}
      }
      if(step.type==='multi'){
        const current=state.answers[step.id]||{selected:[],outro:''};
        const selected=Array.isArray(current.selected)?current.selected:[];
        body='<div class="options">'+step.options.map((opt)=>{const active=selected.includes(opt)?' active':'';return '<button class="opt'+active+'" type="button" data-multi="'+escapeAttr(opt)+'"><span class="opt-row"><span>'+escapeHtml(opt)+'</span><span class="opt-check">✓</span></span></button>';}).join('')+'</div>';
        if(step.outro){const show=selected.includes('Outro')?'':' style="display:none"';body+='<div id="multi-outro-wrap"'+show+'><input class="field" id="multi-outro" type="text" placeholder="Descreva aqui..." value="'+escapeAttr(current.outro||'')+'" maxlength="'+FIELD_LIMITS.outro+'" /></div>'}
      }
      if(step.type==='quantityByService'){
        const values=state.answers[step.id]||{};
        body='<div class="grid-group">'+step.services.map((service)=>{const val=values[service]||'';return '<div class="group-row"><div class="group-label">'+escapeHtml(service)+'</div><input class="field qty-input" type="number" min="1" inputmode="numeric" data-qty="'+escapeAttr(service)+'" placeholder="Ex: 6" value="'+escapeAttr(val)+'" /></div>';}).join('')+'</div>';
      }
      if(step.type==='yesNoByService'){
        const map=state.answers[step.id]||{};
        body='<div class="grid-group">'+step.services.map((service)=>{const yesActive=map[service]==='Sim'?' active':'';const noActive=map[service]==='Nao'?' active':'';return '<div class="group-row"><div class="group-label">'+escapeHtml(service)+'</div><div class="options"><button class="opt'+yesActive+'" type="button" data-yn="'+escapeAttr(service)+'|Sim">Sim</button><button class="opt'+noActive+'" type="button" data-yn="'+escapeAttr(service)+'|Nao">Nao</button></div></div>';}).join('')+'</div>';
      }
      if(step.type==='durationByService'){
        const map=state.answers[step.id]||{};
        body='<div class="grid-group">'+step.services.map((service)=>{const value=map[service]||'';return '<div class="group-row"><div class="group-label">'+escapeHtml(service)+'</div><input class="time-input" data-time-input="'+escapeAttr(service)+'" placeholder="45min" value="'+escapeAttr(value)+'" maxlength="'+FIELD_LIMITS.duration+'" /><div class="quick-times"><button class="quick-time" type="button" data-time="'+escapeAttr(service)+'|30 min">30 min</button><button class="quick-time" type="button" data-time="'+escapeAttr(service)+'|1h">1h</button><button class="quick-time" type="button" data-time="'+escapeAttr(service)+'|2h">2h</button></div></div>';}).join('')+'</div>';
      }

    function attachStepEvents(step,container){

    function collectAndValidate(step,container){
      if(step.type==='text'){
        const raw=String(container.querySelector('#step-input').value||'');

        const maxLen=getTextLimitForField(step.id);
        const value=sanitizeText(raw,maxLen);
        if(step.required&&!value) return fail('Preencha este campo para continuar.');

        return ok(value);
      }
      if(step.type==='phone'){const raw=onlyDigits(container.querySelector('#step-input').value||'');const check=validateBrazilPhone(raw);if(!check.ok) return fail(check.error);return ok(raw);}
      if(step.type==='textarea'){
        const raw=String(container.querySelector('#step-input').value||'');
        if(containsHtml(raw)) return fail('Nao use HTML ou scripts neste campo.');
        const maxLen=step.id==='unica_referencia'?FIELD_LIMITS.referencia:FIELD_LIMITS.extras;
        const value=sanitizeText(raw,maxLen);
        if(step.required&&!value) return fail('Preencha este campo para continuar.');
        if(value&&hasDangerousScheme(value)) return fail(step.id==='unica_referencia'?'Referencia invalida. Use apenas texto ou links seguros.':'Conteudo invalido. Remova links inseguros.');

      }
      if(step.type==='single'){
        const active=container.querySelector('[data-single].active');

        const extra={};
        if(step.outro){
          const outroInput=container.querySelector('#single-outro');
          const outroRaw=outroInput?String(outroInput.value||''):'';
          if(containsHtml(outroRaw)) return fail('Nao use HTML no campo "Outro".');
          const outroValue=sanitizeText(outroRaw,FIELD_LIMITS.outro);
          if(value==='Outro'&&!outroValue) return fail('Descreva o campo "Outro" para continuar.');
          extra[step.id+'_outro']=outroValue;
        }
        return ok(value,extra);
      }
      if(step.type==='multi'){
        const actives=[...container.querySelectorAll('[data-multi].active')].map((item)=>item.getAttribute('data-multi'));
        if(step.required&&actives.length===0) return fail('Selecione pelo menos uma opcao.');
        const outroInput=container.querySelector('#multi-outro');
        const outroRaw=outroInput?String(outroInput.value||''):'';
        if(containsHtml(outroRaw)) return fail('Nao use HTML no campo "Outro".');
        const outroValue=sanitizeText(outroRaw,FIELD_LIMITS.outro);
        if(actives.includes('Outro')&&!outroValue) return fail('Descreva o campo "Outro" para continuar.');

      if(step.type==='quantityByService'){

        for(const service of step.services){const input=container.querySelector('[data-qty="'+cssEscape(service)+'"]');const raw=input?String(input.value||'').trim():'';const num=Number(raw);if(!raw||!Number.isInteger(num)||num<1) return fail('Informe uma quantidade valida para todos os servicos.');map[service]=num;}
        return ok(map);
      }
      if(step.type==='yesNoByService'){
        if(!step.services||step.services.length===0) return ok({});
        const map={};
        for(const service of step.services){
          const yes=container.querySelector('[data-yn="'+cssEscape(service)+'|Sim"]');
          const no=container.querySelector('[data-yn="'+cssEscape(service)+'|Nao"]');
          if(yes&&yes.classList.contains('active')) map[service]='Sim';
          if(no&&no.classList.contains('active')) map[service]='Nao';
          if(!map[service]) return fail('Responda se o material esta gravado para todos os servicos.');
        }
        return ok(map);
      }
      if(step.type==='durationByService'){
        if(!step.services||step.services.length===0) return ok({});
        const map={};
        for(const service of step.services){
          const input=container.querySelector('[data-time-input="'+cssEscape(service)+'"]');
          const raw=input?String(input.value||''):'';
          if(containsHtml(raw)) return fail('Use somente texto simples no tempo de material.');
          const value=sanitizeText(raw,FIELD_LIMITS.duration);
          if(!value) return fail('Informe o tempo de material bruto para cada servico listado.');
          map[service]=value;
        }
        return ok(map);
      }
      return ok('');
    }

    async function initTurnstile(container){
      const errorEl=container.querySelector('#submit-error');
      const widgetHost=container.querySelector('#turnstile-widget');
      if(!widgetHost) return;
      try{
        const siteKey=await getTurnstileSiteKey();
        if(!siteKey){
          showSubmitError(errorEl,'Nao foi possivel carregar a protecao anti-bot. Atualize a pagina e tente novamente.');
          return;
        }
        if(!window.turnstile||typeof window.turnstile.render!=='function'){
          window.setTimeout(()=>{if(document.body.contains(widgetHost)&&!state.turnstileWidgetId) initTurnstile(container);},350);
          showSubmitError(errorEl,'Nao foi possivel carregar a protecao anti-bot. Atualize a pagina e tente novamente.');
          return;
        }
        state.turnstileToken='';
        state.turnstileWidgetId=window.turnstile.render(widgetHost,{
          sitekey:siteKey,
          theme:'dark',
          callback:(token)=>{
            state.turnstileToken=token||'';
            hideSubmitError(errorEl);
            settleTurnstilePending(true,state.turnstileToken);
          },
          'expired-callback':()=>{
            state.turnstileToken='';
            settleTurnstilePending(false,'expired');
            showSubmitError(errorEl,'A verificacao expirou. Confirme novamente para continuar.');
          },
          'error-callback':()=>{
            state.turnstileToken='';
            settleTurnstilePending(false,'error');
            showSubmitError(errorEl,'Falha na verificacao anti-bot. Tente novamente.');
          }
        });
      }catch(err){
        const message=String(err&&err.message||'');
        if(message.toLowerCase().includes('site key not configured')){
          showSubmitError(errorEl,'Turnstile ainda nao foi configurado no servidor. Avise o suporte para finalizar a chave.');
          return;
        }
        showSubmitError(errorEl,'Nao foi possivel validar a seguranca agora. Tente novamente em instantes.');
      }
    }
    async function getTurnstileSiteKey(){
      if(state.turnstileSiteKey) return state.turnstileSiteKey;
      const response=await fetch('/api/turnstile-config',{method:'GET',headers:{'Accept':'application/json'}});
      const data=await response.json().catch(()=>null);
      if(!response.ok||!data||!data.ok){
        const errorText=data&&data.error?String(data.error):'turnstile_config_error';
        throw new Error(errorText);
      }
      if(!data||!data.ok||!data.siteKey) throw new Error('turnstile_key_missing');
      state.turnstileSiteKey=String(data.siteKey);
      return state.turnstileSiteKey;
    }
    async function handleFinalSubmit(container){
      const submitBtn=container.querySelector('#final-submit');
      const errorEl=container.querySelector('#submit-error');
      const honeypotInput=container.querySelector('#spam-trap');
      if(state.isSubmitting) return;
      const now=Date.now();
      if(now<state.submitLockedUntil){
        const waitSeconds=Math.ceil((state.submitLockedUntil-now)/1000);
        showSubmitError(errorEl,'Aguarde '+waitSeconds+'s antes de tentar novamente.');
        return;
      }
      if(now-state.startedAt<MIN_ELAPSED_MS){
        showSubmitError(errorEl,'Quase la. Aguarde um instante e tente novamente.');
        return;
      }
      if(!state.turnstileToken){
        const requested=await requestTurnstileToken(errorEl);
        if(!requested) return;
      }
      hideSubmitError(errorEl);
      const payload=buildSubmissionPayload(honeypotInput?honeypotInput.value:'');
      const payloadHash=JSON.stringify(payload.answers);
      if(state.lastSubmissionHash&&state.lastSubmissionHash===payloadHash){
        showSubmitError(errorEl,'Esse envio ja foi validado. Abrindo WhatsApp...');
        openWhatsApp(payload.answers);
        return;
      }
      state.isSubmitting=true;
      submitBtn.disabled=true;
      const originalText=submitBtn.textContent;
      submitBtn.textContent='Validando seguranca...';
      try{
        const response=await fetch('/api/validate-submit',{
          method:'POST',
          headers:{'Content-Type':'application/json','Accept':'application/json'},
          body:JSON.stringify(payload)
        });
        const data=await response.json().catch(()=>null);
        if(!response.ok||!data||!data.ok){
          const message=mapSubmitError(data&&data.error,response.status);
          showSubmitError(errorEl,message);
          refreshTurnstileWidget();
          state.submitLockedUntil=Date.now()+Math.min(FINAL_COOLDOWN_MS,4000);
          return;
        }
        state.lastSubmissionHash=payloadHash;
        state.submitLockedUntil=Date.now()+FINAL_COOLDOWN_MS;
        state.finalError='';
        openWhatsApp(payload.answers);
      }catch{
        showSubmitError(errorEl,'Falha de conexao. Verifique sua internet e tente novamente.');
      }finally{
        state.isSubmitting=false;
        submitBtn.disabled=false;
        submitBtn.textContent=originalText;
      }
    }
    async function requestTurnstileToken(errorEl){
      if(state.turnstileToken) return true;
      if(!window.turnstile||state.turnstileWidgetId===null){
        showSubmitError(errorEl,'Protecao anti-bot ainda carregando. Aguarde alguns segundos e tente novamente.');
        return false;
      }
      if(state.turnstilePendingPromise){
        try{
          await state.turnstilePendingPromise;
          return !!state.turnstileToken;
        }catch{
          showSubmitError(errorEl,'Nao foi possivel validar a verificacao anti-bot. Tente novamente.');
          return false;
        }
      }
      showSubmitError(errorEl,'Validando verificacao anti-bot...');
      state.turnstilePendingPromise=new Promise((resolve,reject)=>{
        state.turnstileResolve=resolve;
        state.turnstileReject=reject;
        const timeout=window.setTimeout(()=>{
          settleTurnstilePending(false,'timeout');
          showSubmitError(errorEl,'A verificacao demorou para responder. Tente novamente.');
        },9000);
        state.turnstileResolve=((value)=>{window.clearTimeout(timeout);resolve(value);});
        state.turnstileReject=((reason)=>{window.clearTimeout(timeout);reject(reason);});
      }).finally(()=>{
        state.turnstilePendingPromise=null;
      });
      try{
        window.turnstile.execute(state.turnstileWidgetId);
        await state.turnstilePendingPromise;
        hideSubmitError(errorEl);
        return !!state.turnstileToken;
      }catch{
        return false;
      }
    }
    function settleTurnstilePending(ok,value){
      if(ok&&state.turnstileResolve){
        const resolve=state.turnstileResolve;
        state.turnstileResolve=null;
        state.turnstileReject=null;
        resolve(value||'');
        return;
      }
      if(!ok&&state.turnstileReject){
        const reject=state.turnstileReject;
        state.turnstileResolve=null;
        state.turnstileReject=null;
        reject(value||'turnstile_error');
      }
    }
    function refreshTurnstileWidget(){
      if(!window.turnstile||state.turnstileWidgetId===null) return;
      state.turnstileToken='';

    }

    function mapSubmitError(error,status){

    function sanitizeText(value,maxLen){
      if(typeof value!=='string') return '';

      const withoutTags=normalized.replace(/<[^>]*>/g,'');

    function validateBrazilPhone(digits){
      if(!digits) return {ok:false,error:'Digite seu WhatsApp para continuar.'};
      if(digits.length<10||digits.length>11) return {ok:false,error:'Use um numero brasileiro com DDD e 10 ou 11 digitos.'};
      const ddd=digits.slice(0,2);
      if(!DDD_VALIDOS.has(ddd)) return {ok:false,error:'DDD invalido. Verifique o numero e tente novamente.'};
      if(/^(\d)\1+$/.test(digits)) return {ok:false,error:'Numero invalido. Digite um WhatsApp real.'};
      if(digits==='12345678910') return {ok:false,error:'Numero invalido. Digite um WhatsApp real.'};
      if(isSequential(digits)) return {ok:false,error:'Numero invalido. Digite um WhatsApp real.'};
      if(digits.length===11&&digits.charAt(2)!=='9') return {ok:false,error:'Para 11 digitos, o numero deve ser celular valido.'};
      return {ok:true};
    }
    function isSequential(value){const arr=value.split('').map((n)=>Number(n));let up=true;let down=true;for(let i=1;i<arr.length;i++){if(arr[i]!==arr[i-1]+1) up=false;if(arr[i]!==arr[i-1]-1) down=false;}return up||down;}
    function onlyDigits(value){return String(value||'').replace(/\D/g,'');}
    function formatPhone(value){const digits=onlyDigits(value).slice(0,11);if(!digits) return '';if(digits.length<=2) return '('+digits;if(digits.length<=6) return '('+digits.slice(0,2)+') '+digits.slice(2);if(digits.length<=10) return '('+digits.slice(0,2)+') '+digits.slice(2,6)+'-'+digits.slice(6);return '('+digits.slice(0,2)+') '+digits.slice(2,7)+'-'+digits.slice(7);}
    function ok(value,extra){return {ok:true,value,extra:extra||null}};
    function fail(error){return {ok:false,error}};
    function escapeHtml(str){return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
    function escapeAttr(str){return escapeHtml(str);}
    function cssEscape(value){return String(value).replace(/([#.;?+*~':"!^$\[\]()=>|\\/@])/g,'\\$1');}
    render();
  </script>
</body>
