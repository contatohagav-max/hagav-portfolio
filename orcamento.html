
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento · HAGAV Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--yellow:#ffb800;--bg:#090304;--glass:rgba(255,255,255,.12);--glass-strong:rgba(255,255,255,.2);--text-soft:rgba(255,255,255,.68);--ok:#58d08b;--danger:#ff7373}
    html,body{min-height:100%;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:#fff;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 78% 96% at -8% 50%,rgba(255,122,37,.58) 0%,rgba(110,32,8,.3) 42%,transparent 70%),radial-gradient(ellipse 65% 50% at 108% 0%,rgba(252,168,64,.32) 0%,rgba(120,40,11,.18) 34%,transparent 65%),radial-gradient(ellipse 45% 34% at 88% 90%,rgba(255,141,0,.12) 0%,transparent 65%),linear-gradient(135deg,#090304 0%,#0e0607 54%,#120807 100%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 92% 56% at 50% 120%,rgba(255,172,72,.2) 0%,transparent 62%),radial-gradient(ellipse 160% 66% at -26% 28%,transparent 64%,rgba(255,165,58,.15) 65%,transparent 67%),radial-gradient(ellipse 140% 70% at 124% 14%,transparent 66%,rgba(255,145,32,.1) 67%,transparent 69%);mix-blend-mode:screen;pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;width:min(100%,560px);min-height:100svh;margin:0 auto;padding:0 20px 80px;display:flex;flex-direction:column}
    .header{display:flex;justify-content:center;padding:16px 0 0;margin-bottom:-12px}
    .header img{height:108px;width:auto;display:block}
    .intro{text-align:center;padding:10px 4px 18px}
    .intro h1{font-size:clamp(17px,4.8vw,22px);font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;margin-bottom:8px}
    .intro p{font-size:13px;line-height:1.6;color:var(--text-soft)}
    .progress-wrap{margin-bottom:18px;padding:0 2px}
    .progress-track{height:2px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:var(--yellow);transition:width .28s ease}
    .progress-label{margin-top:6px;text-align:right;font-size:11px;color:rgba(255,255,255,.42);letter-spacing:.05em}
    .steps{display:flex;flex-direction:column;gap:10px;flex:1}
    .step-done{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);animation:fadeIn .25s ease}
    .step-done .label{font-size:12px;color:rgba(255,255,255,.72);font-weight:700;line-height:1.4}
    .step-done .ok{font-size:12px;color:var(--ok);opacity:.9}
    .step-active{position:relative;border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.05));box-shadow:0 14px 30px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);padding:20px;animation:slideIn .28s ease}
    .step-back{position:absolute;top:10px;right:10px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.84);font-size:11px;font-weight:700;border-radius:999px;padding:7px 10px;cursor:pointer}
    .step-title{font-size:20px;font-weight:800;line-height:1.3;padding-right:66px}
    .step-hint{font-size:12px;line-height:1.5;color:rgba(255,255,255,.54);margin:7px 0 14px}
    .field,.textarea,.time-input{width:100%;border-radius:11px;border:1.2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-family:inherit;padding:12px 13px;outline:none;transition:border-color .18s ease, background .18s ease}
    .textarea{resize:none;min-height:90px;line-height:1.5}
    .field::placeholder,.textarea::placeholder,.time-input::placeholder{color:rgba(255,255,255,.33)}
    .field:focus,.textarea:focus,.time-input:focus{border-color:rgba(255,184,0,.52);background:rgba(255,184,0,.07)}
    .options{display:flex;flex-direction:column;gap:8px}
    .opt{width:100%;text-align:left;border-radius:12px;border:1.2px solid rgba(255,255,255,.16);background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));box-shadow:0 8px 18px rgba(0,0,0,.2);color:#fff;font-size:13px;font-weight:700;padding:12px 13px;cursor:pointer;transition:all .16s ease}
    .opt.active{border-color:rgba(255,200,112,.55);background:linear-gradient(135deg,rgba(255,200,112,.22),rgba(255,255,255,.08))}
    .opt-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
    .opt-check{color:var(--ok);font-size:11px;opacity:0;transition:opacity .15s ease}
    .opt.active .opt-check{opacity:1}
    .grid-group{display:flex;flex-direction:column;gap:10px}
    .group-row{border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px;background:rgba(255,255,255,.04);display:flex;flex-direction:column;gap:8px}
    .group-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
    .qty-input{max-width:120px}
    .quick-times{display:flex;gap:6px;flex-wrap:wrap}
    .quick-time{border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(255,255,255,.06);color:#fff;font-size:12px;font-weight:700;padding:8px 10px;cursor:pointer}
    .actions{display:flex;gap:8px;margin-top:14px;align-items:center}
    .btn-main,.btn-skip{border-radius:11px;font-family:inherit;font-weight:800;cursor:pointer;border:1.2px solid var(--glass);transition:all .16s ease}
    .btn-main{background:linear-gradient(135deg,rgba(255,210,130,.24),rgba(255,255,255,.09));color:#fff;border-color:rgba(255,201,114,.42);font-size:13px;padding:11px 18px}
    .btn-skip{background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.05));color:rgba(255,255,255,.72);font-size:12px;padding:11px 14px}
    .btn-submit{width:100%;margin-top:6px;border-radius:14px;border:1.2px solid rgba(255,201,114,.42);background:linear-gradient(135deg,rgba(255,210,130,.24),rgba(255,255,255,.09));color:#fff;font-size:15px;font-weight:800;font-family:inherit;padding:14px;cursor:pointer}
    .btn-main[disabled],.btn-submit[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .error{display:none;margin-top:7px;font-size:12px;color:var(--danger)}
    .submit-note{font-size:11px;line-height:1.5;color:rgba(255,255,255,.56);margin:10px 0 2px}
    .bot-trap{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;opacity:0;visibility:hidden;pointer-events:none}
    .type-picker{border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.05));box-shadow:0 14px 30px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.14);padding:16px;display:flex;flex-direction:column;gap:10px;animation:slideIn .28s ease}
    .type-picker h2{font-size:18px;font-weight:800;line-height:1.3}
    footer{text-align:center;font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.04em;padding:20px 0 14px}
    @media(hover:hover){.opt:hover,.btn-main:hover,.btn-skip:hover,.btn-submit:hover,.quick-time:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(0,0,0,.26),0 0 18px rgba(255,184,0,.09)}.step-back:hover{background:rgba(255,255,255,.14)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <main class="page">
    <div class="header"><img src="./assets/logo.png" alt="HAGAV" /></div>
    <section class="intro">
      <h1>Orçamento personalizado</h1>
      <p>Leva cerca de 2 minutos e nos ajuda a responder com mais rapidez e assertividade.</p>
    </section>
    <section class="progress-wrap" aria-live="polite">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </section>
    <section class="steps" id="steps"></section>
    <footer>© 2026 HAGAV Studio de Edição</footer>
  </main>
  <script src="./assets/budget-inline.js"></script>
</body>
</html>
