
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento · HAGAV Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--yellow:#ffb800;--bg:#0b0b0b;--bg-soft:#111111;--bg-deep:#141414;--glass:rgba(255,255,255,.11);--glass-strong:rgba(255,255,255,.16);--text-soft:rgba(255,255,255,.68);--ok:#58d08b;--danger:#ff7373;--warm-glow:rgba(255,190,104,.14)}
    html,body{min-height:100%;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;color:#fff;overflow-x:hidden}
    body{background:radial-gradient(120% 72% at 50% -18%,rgba(255,190,95,.09) 0%,transparent 52%),linear-gradient(160deg,var(--bg) 0%,var(--bg-soft) 46%,var(--bg-deep) 100%)}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 74% 90% at -12% 48%,rgba(255,146,58,.18) 0%,rgba(120,48,19,.12) 36%,transparent 72%),radial-gradient(ellipse 65% 50% at 110% 0%,rgba(255,194,103,.16) 0%,rgba(131,68,30,.1) 36%,transparent 68%),radial-gradient(ellipse 45% 34% at 88% 90%,rgba(255,164,70,.08) 0%,transparent 66%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 82% 54% at 50% 118%,rgba(255,190,94,.12) 0%,transparent 66%),radial-gradient(ellipse 180% 72% at -22% 26%,transparent 66%,rgba(255,168,70,.06) 67%,transparent 70%),radial-gradient(ellipse 160% 74% at 122% 16%,transparent 66%,rgba(255,167,70,.07) 67%,transparent 70%);mix-blend-mode:soft-light;pointer-events:none;z-index:0}
    .page{position:relative;z-index:1;width:min(100%,560px);min-height:100svh;margin:0 auto;padding:0 20px 80px;display:flex;flex-direction:column}
    .decor-layer{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:visible}
    .decor-asset{position:absolute;display:block;user-select:none;pointer-events:none;will-change:transform,opacity}
    .decor-planilha{width:clamp(220px,44vw,320px);right:-152px;top:94px;opacity:.34;filter:drop-shadow(0 16px 38px rgba(0,0,0,.34));animation:floatPlanilha 16s ease-in-out infinite alternate}
    .decor-icon{width:clamp(78px,12vw,112px);left:-26px;top:168px;opacity:.12;filter:drop-shadow(0 10px 22px rgba(0,0,0,.26));animation:floatIcon 18s ease-in-out infinite alternate}
    .page > *{position:relative;z-index:1}
    .header{display:flex;justify-content:center;padding:16px 0 0;margin-bottom:-10px}
    .header img{height:112px;width:auto;display:block;filter:drop-shadow(0 12px 24px rgba(0,0,0,.34))}
    .intro{text-align:center;padding:10px 4px 18px}
    .intro h1{font-size:clamp(17px,4.8vw,22px);font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:#fff;margin-bottom:8px}
    .intro p{font-size:13px;line-height:1.6;color:var(--text-soft)}
    .progress-wrap{margin-bottom:18px;padding:0 2px}
    .progress-track{height:2px;background:rgba(255,255,255,.14);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;width:0%;background:var(--yellow);transition:width .28s ease}
    .progress-label{margin-top:6px;text-align:right;font-size:11px;color:rgba(255,255,255,.42);letter-spacing:.05em}
    .steps{display:flex;flex-direction:column;gap:10px;flex:1}
    .step-done{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.025));box-shadow:0 12px 24px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.08);animation:fadeIn .25s ease}
    .step-done .label{font-size:12px;color:rgba(255,255,255,.72);font-weight:700;line-height:1.4}
    .step-done .ok{font-size:12px;color:var(--ok);opacity:.9}
    .step-active{position:relative;border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(150deg,rgba(255,255,255,.1),rgba(255,255,255,.04));box-shadow:0 22px 44px rgba(0,0,0,.42),0 0 28px rgba(255,184,0,.08),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:20px;animation:slideIn .28s ease}
    .step-back{position:absolute;top:10px;right:10px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.08);color:rgba(255,255,255,.86);font-size:11px;font-weight:700;border-radius:999px;padding:7px 10px;cursor:pointer;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
    .step-title{font-size:20px;font-weight:800;line-height:1.3;padding-right:66px}
    .step-hint{font-size:12px;line-height:1.5;color:rgba(255,255,255,.54);margin:7px 0 14px}
    .field,.textarea,.time-input{width:100%;border-radius:11px;border:1.2px solid rgba(255,255,255,.18);background:linear-gradient(145deg,rgba(255,255,255,.085),rgba(255,255,255,.045));color:#fff;font-size:15px;font-family:inherit;padding:12px 13px;outline:none;transition:border-color .18s ease, background .18s ease, box-shadow .18s ease}
    .textarea{resize:none;min-height:90px;line-height:1.5}
    .field::placeholder,.textarea::placeholder,.time-input::placeholder{color:rgba(255,255,255,.33)}
    .field:focus,.textarea:focus,.time-input:focus{border-color:rgba(255,194,102,.52);background:linear-gradient(145deg,rgba(255,194,102,.16),rgba(255,255,255,.06));box-shadow:0 0 0 1px rgba(255,184,0,.12),0 10px 24px rgba(0,0,0,.24)}
    .options{display:flex;flex-direction:column;gap:8px}
    .opt{width:100%;text-align:left;border-radius:12px;border:1.2px solid rgba(255,255,255,.15);background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.04));box-shadow:0 10px 22px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.08);color:#fff;font-size:13px;font-weight:700;padding:12px 13px;cursor:pointer;transition:all .16s ease}
    .opt.active{border-color:rgba(255,200,112,.56);background:linear-gradient(145deg,rgba(255,200,112,.24),rgba(255,255,255,.09));box-shadow:0 14px 24px rgba(0,0,0,.3),0 0 18px rgba(255,184,0,.1)}
    .opt-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px}
    .opt-check{color:var(--ok);font-size:11px;opacity:0;transition:opacity .15s ease}
    .opt.active .opt-check{opacity:1}
    .grid-group{display:flex;flex-direction:column;gap:10px}
    .group-row{border:1px solid rgba(255,255,255,.11);border-radius:12px;padding:11px;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.03));box-shadow:0 10px 22px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.07);display:flex;flex-direction:column;gap:8px}
    .group-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
    .qty-input{max-width:120px}
    .quick-times{display:flex;gap:6px;flex-wrap:wrap}
    .quick-time{border:1px solid rgba(255,255,255,.16);border-radius:10px;background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.045));color:#fff;font-size:12px;font-weight:700;padding:8px 10px;cursor:pointer}
    .actions{display:flex;gap:8px;margin-top:14px;align-items:center}
    .btn-main,.btn-skip{border-radius:11px;font-family:inherit;font-weight:800;cursor:pointer;border:1.2px solid var(--glass);transition:all .16s ease}
    .btn-main{background:linear-gradient(145deg,rgba(255,210,130,.28),rgba(255,255,255,.09));color:#fff;border-color:rgba(255,201,114,.46);font-size:13px;padding:11px 18px;box-shadow:0 14px 26px rgba(0,0,0,.28),0 0 18px rgba(255,184,0,.12)}
    .btn-skip{background:linear-gradient(145deg,rgba(255,255,255,.14),rgba(255,255,255,.05));color:rgba(255,255,255,.74);font-size:12px;padding:11px 14px;box-shadow:0 10px 20px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08)}
    .btn-submit{width:100%;margin-top:6px;border-radius:14px;border:1.2px solid rgba(255,201,114,.46);background:linear-gradient(145deg,rgba(255,210,130,.28),rgba(255,255,255,.09));color:#fff;font-size:15px;font-weight:800;font-family:inherit;padding:14px;cursor:pointer;box-shadow:0 16px 30px rgba(0,0,0,.3),0 0 20px rgba(255,184,0,.13)}
    .btn-main[disabled],.btn-submit[disabled]{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .error{display:none;margin-top:7px;font-size:12px;color:var(--danger)}
    .submit-note{font-size:11px;line-height:1.5;color:rgba(255,255,255,.56);margin:10px 0 2px}
    .bot-trap{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden;opacity:0;visibility:hidden;pointer-events:none}
    .type-picker{border-radius:18px;border:1.2px solid var(--glass-strong);background:linear-gradient(150deg,rgba(255,255,255,.1),rgba(255,255,255,.04));box-shadow:0 22px 44px rgba(0,0,0,.42),0 0 28px rgba(255,184,0,.08),inset 0 1px 0 rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding:16px;display:flex;flex-direction:column;gap:10px;animation:slideIn .28s ease}
    .type-picker h2{font-size:18px;font-weight:800;line-height:1.3}
    footer{text-align:center;font-size:11px;color:rgba(255,255,255,.22);letter-spacing:.04em;padding:20px 0 14px}
    @media(max-width:700px){.decor-planilha{width:clamp(170px,56vw,250px);right:-116px;top:132px;opacity:.24}.decor-icon{left:-20px;top:122px;opacity:.09}}
    @media(max-width:560px){.page{padding:0 16px 72px}.header img{height:98px}.decor-planilha{display:none}.decor-icon{width:72px;top:102px;left:-18px;opacity:.06}}
    @media(prefers-reduced-motion:reduce){.decor-asset{animation:none!important}}
    @media(hover:hover){.opt:hover,.btn-main:hover,.btn-skip:hover,.btn-submit:hover,.quick-time:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(0,0,0,.32),0 0 20px rgba(255,184,0,.11)}.step-back:hover{background:rgba(255,255,255,.14)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes floatPlanilha{from{transform:translate3d(0,0,0) rotate(-7deg)}to{transform:translate3d(-6px,-12px,0) rotate(-5deg)}}
    @keyframes floatIcon{from{transform:translate3d(0,0,0) rotate(-8deg)}to{transform:translate3d(0,-8px,0) rotate(-10deg)}}
  </style>
</head>
<body>
  <main class="page">
    <div class="decor-layer" aria-hidden="true">
      <img class="decor-asset decor-planilha" src="./assets/planilha-hagav-3d.png" alt="" decoding="async" />
      <img class="decor-asset decor-icon" src="./assets/logo-icon.png" alt="" decoding="async" />
    </div>
    <div class="header"><img src="./assets/logo-3d-hagav.png" alt="HAGAV" /></div>
    <section class="intro">
      <h1>Orçamento personalizado</h1>
      <p>Leva cerca de 2 minutos e nos ajuda a responder com mais rapidez e assertividade.</p>
    </section>
    <section class="progress-wrap" aria-live="polite">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 0</div>
    </section>
    <section class="steps" id="steps"></section>
    <footer>© <span data-footer-year>2026</span> HAGAV Studio de Edição • Todos os direitos reservados</footer>
  </main>
  <script src="./assets/budget-inline.js"></script>
  <script>
    document.querySelectorAll('[data-footer-year]').forEach((el)=>{
      el.textContent = String(new Date().getFullYear());
    });
  </script>
</body>
</html>
