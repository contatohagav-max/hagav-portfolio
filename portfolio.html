let active='curtos';

const verticalCats=new Set(['curtos','cortes','ads']);

function thumbCandidates(yt){
  return [
    'https://i.ytimg.com/vi_webp/'+yt+'/hqdefault.webp',
    'https://i.ytimg.com/vi/'+yt+'/hqdefault.jpg',
    'https://i.ytimg.com/vi/'+yt+'/mqdefault.jpg',
  ];
}

function setThumbSource(img,yt){
  var candidates=thumbCandidates(yt);
  var idx=0;
  img.addEventListener('load',function(){img.classList.add('is-loaded');},{once:true});
  img.addEventListener('error',function handleError(){
    idx+=1;
    if(idx<candidates.length){
      img.src=candidates[idx];
      return;
    }
    img.removeEventListener('error',handleError);
    img.classList.add('is-loaded');
  });
  img.src=candidates[idx];
}

function isVerticalVideo(v){
  if(typeof v.vertical==='boolean') return v.vertical;
  return verticalCats.has(v.cat);
}

function renderGrid(){
  var filtered=vids.filter(function(v){return v.cat===active;});
  document.getElementById('counter').textContent=filtered.length+' v\u00EDdeos';
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  filtered.forEach(function(v){
    var d=document.createElement('div');
    d.className='card';
    var img=document.createElement('img');
    img.className='thumb';
    img.alt=v.title;
    img.loading='lazy';
    img.decoding='async';
    img.referrerPolicy='strict-origin-when-cross-origin';
    setThumbSource(img,v.yt);
    var play=document.createElement('div');
    play.className='card-play';
    var tri=document.createElement('div');
    tri.className='card-play-tri';
    play.appendChild(tri);
    d.appendChild(img);
    d.appendChild(play);
    d.addEventListener('click',function(){openModal(v);});
    grid.appendChild(d);
  });
}

function renderPills(){
  var c=document.getElementById('pills');
  c.innerHTML='';
  cats.forEach(function(cat){
    var b=document.createElement('button');
    b.className='pill'+(cat.id===active?' active':'');
    b.innerHTML='<strong>'+cat.main+'</strong><span class="pill-sub">'+cat.sub+'</span>';
    b.addEventListener('click',function(){active=cat.id;renderPills();renderGrid();});
    c.appendChild(b);
  });
}

function openModal(v){
  var modal=document.getElementById('modal');
  var modalCard=modal.querySelector('.modal');
  var isVertical=isVerticalVideo(v);
  var catObj=cats.find(function(c){return c.id===v.cat;});
  document.getElementById('m-cat').textContent=catObj?catObj.main:'';
  document.getElementById('m-title').textContent=v.title;
  modalCard.classList.toggle('vertical',isVertical);
  modalCard.classList.toggle('wide',!isVertical);
  var videoEl=document.getElementById('m-video');
  videoEl.className='modal-video '+(isVertical?'vertical':'wide');
  videoEl.innerHTML='<iframe src="https://www.youtube.com/embed/'+v.yt+'?autoplay=1&rel=0&modestbranding=1&playsinline=1&iv_load_policy=3&vq=hd720" allow="autoplay; encrypted-media; fullscreen; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen loading="eager"></iframe>';
  modal.classList.add('open');
}

function closeModal(){
  var modal=document.getElementById('modal');
  modal.classList.remove('open');
  var modalCard=modal.querySelector('.modal');
  modalCard.classList.remove('vertical','wide');
  var videoEl=document.getElementById('m-video');
  videoEl.className='modal-video';
  videoEl.innerHTML='';
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

renderPills();
renderGrid();
document.querySelectorAll('[data-footer-year]').forEach(function(el){
  el.textContent = String(new Date().getFullYear());
});
</script>
